# Google Cloud Storage Configuration
gcs.project.id=${GCS_PROJECT_ID:abas-tegence}
gcs.bucket.name=${GCS_BUCKET_NAME:voicing-audio-bucket}
# On Cloud Run, use default credentials; locally set GCS_CREDENTIALS_PATH
gcs.credentials.path=${GCS_CREDENTIALS_PATH:/Users/samiat/Downloads/abas-tegence-6e22613e43fd.json}

# Audio Processing Configuration
audio.default.sample.rate=16000
audio.default.format=WAV
audio.max.file.size.mb=100
audio.suppression.model.path=/gcs/voicing-models-abas/demucs_16k_dynamic.onnx
audio.embedding.model.path=/gcs/voicing-models-abas/speaker_embedding.onnx
audio.vad.threshold.db=-40
audio.vad.frame.ms=30
audio.vad.hop.ms=15
audio.vad.segment.min.ms=300
audio.vad.max.silence.bridge.ms=150
audio.verify.threshold=70
audio.verify.window.sim.threshold=0.6
audio.verify.min.speech.windows=3
audio.verify.top.percent=0.3

# Server Configuration
server.port=9090
server.host=0.0.0.0

# MongoDB Configuration
mongodb.connection.string=${MONGODB_CONNECTION_STRING:mongodb+srv://obolamatanmi:walnutbed@cluster0.oto9dja.mongodb.net/?appName=Cluster0}
mongodb.database.name=${MONGODB_DATABASE_NAME:voicing_backend}

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:my-super-long-very-secure-jwt-secret-key-32bytes+}
jwt.expiration.hours=720

# Logging Configuration
logging.level.org.example.voicingbackend=INFO
logging.level.com.google.cloud.storage=DEBUG
logging.level.org.mongodb=INFO
logging.level.org.example.voicingbackend.service.GoogleCloudStorageService=DEBUG

# AWS S3 Configuration
aws.accessKeyId=${AWS_ACCESS_KEY_ID:samiat.bola-matanmi@tegence.com}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:Walnutbed213$}
aws.region=${AWS_REGION:eu-north-1}
s3.bucket.name=${S3_BUCKET_NAME:voicing-audio-bucket}

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:}

# G2P Configuration
g2p.default.language=en
g2p.cmu.dict.path=src/main/resources/cmudict-0.7b
g2p.phoneme.vocab.resource=phoneme_vocab.json
g2p.phone.map.resource=phone_id_map.txt

# Remote phoneme service (disabled - using local G2P with Nigerian English default)
phoneme.remote.enabled=0
phoneme.remote.host=localhost
phoneme.remote.port=50051

# TTS settings
tts.fastspeech.path=/gcs/voicing-models-abas/fastspeech2_traced.pt
tts.fastspeech.onnx.path=/gcs/voicing-models-abas/fastspeech2_ljspeech.onnx
tts.hifigan.path=/gcs/voicing-models-abas/hifigan_ljspeech.onnx
tts.baked.onnx.path=/gcs/voicing-models-abas/baked_model.onnx
